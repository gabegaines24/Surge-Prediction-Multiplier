# Surge prediction project configuration
paths:
  processed_dir: ./processed_data/
  model_dir: ./models/
  taxi_data_dir: ./taxi data/

model:
  n_estimators: 300
  learning_rate: 0.08
  max_depth: 6
  objective: reg:squarederror
  random_state: 42
  early_stopping_rounds: 30
  # Used when early stopping; subsample of rows for eval
  eval_metric: mae

tuning:
  enabled: false
  cv_splits: 3
  max_samples: 20000  # subsample for grid search speed
  param_grid:
    n_estimators: [100, 200]
    max_depth: [4, 6, 8]
    learning_rate: [0.05, 0.1]

data:
  # Time-ordered split for processed parquet (see backend/retrieval.py):
  #   train: Time_Bin < train_test_split_date
  #   test:  Time_Bin >= train_test_split_date
  # Refresh TLC parquet under paths.taxi_data_dir, then bump dates to match coverage.
  train_test_split_date: "2025-03-01"
  weather_start: "2025-01-01"
  weather_end: "2025-05-31"
  # Clip / drop extreme DER values (0 = disable clipping)
  der_outlier_upper: 15.0
  der_outlier_lower: 0.01
  min_active_requests: 0

mlflow:
  enabled: false
  experiment_name: surge_prediction

api:
  host: 0.0.0.0
  port: 8000
  predict_cache_maxsize: 256
